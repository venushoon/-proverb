<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>초등 속담/관용구 팡팡!</title>
    <link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    
    <style>
        :root {
            /* 밝은 모드 색상 */
            --bg-gradient: linear-gradient(135deg, #e0c3fc 0%, #8ec5fc 100%);
            --container-bg: rgba(255, 255, 255, 0.95);
            --text-color: #2d3436;
            --primary: #4cc9f0;
            --secondary: #6c5ce7;
            --accent: #ff7675;
            --correct: #00b894;
            --wrong: #d63031;
            --btn-bg: #ffffff;
            --btn-border: #74b9ff;
            --shadow: rgba(0,0,0,0.15);
            
            /* 플레이어 색상 */
            --p1-color: #fdcb6e;
            --p2-color: #00cec9;
        }

        body.dark-mode {
            /* 다크 모드 색상 */
            --bg-gradient: linear-gradient(135deg, #1e1e2f 0%, #10101a 100%);
            --container-bg: #2d3436;
            --text-color: #dfe6e9;
            --primary: #0984e3;
            --secondary: #6c5ce7;
            --accent: #ff7675;
            --btn-bg: #2d3436;
            --btn-border: #6c5ce7;
            --shadow: rgba(0,0,0,0.5);
            color: white;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Jua', sans-serif;
            background: var(--bg-gradient);
            color: var(--text-color);
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            transition: background 0.3s;
            touch-action: none;
            -webkit-user-select: none;
            user-select: none;
        }

        .screen {
            display: none;
            width: 100vw;
            height: 100vh;
            flex-direction: column;
            position: absolute;
            top: 0; left: 0;
            padding: 2vmin;
        }

        .screen.active { display: flex; }

        /* 세련된 중앙 컨테이너 */
        .center-container {
            width: 95%;
            max-width: 1000px;
            max-height: 95vh;
            margin: auto;
            background: var(--container-bg);
            border-radius: 30px;
            box-shadow: 0 15px 35px var(--shadow);
            padding: 4vmin;
            display: flex;
            flex-direction: column;
            backdrop-filter: blur(10px);
            position: relative;
        }

        h1 { font-size: clamp(2.5rem, 5vw, 4.5rem); text-align: center; color: var(--secondary); margin-bottom: 5px; }
        h2 { font-size: clamp(1.8rem, 4vw, 3rem); text-align: center; margin-top: 0; color: var(--text-color); }
        .subtitle { text-align: center; font-size: clamp(1.2rem, 3vw, 1.5rem); color: #636e72; margin-bottom: 20px; }
        body.dark-mode .subtitle { color: #b2bec3; }

        /* 공통 버튼 디자인 */
        button {
            font-family: inherit;
            cursor: pointer;
            border-radius: 20px;
            border: none;
            font-weight: bold;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        button:active { transform: scale(0.95); }
        
        /* 버튼 텍스트 잘림 해결 및 정렬 최적화 */
        .main-btn {
            background: var(--secondary);
            color: white;
            font-size: clamp(1.6rem, 4vw, 2.5rem);
            padding: 15px 20px; /* 패딩 조정 */
            box-shadow: 0 6px 0px rgba(0,0,0,0.2);
            flex: 1;
            width: 90%;
            max-width: 400px;
            display: flex;
            flex-direction: column; /* 아이콘/글씨와 보조 텍스트 분리 */
            align-items: center;
            justify-content: center;
            line-height: 1.2;
            margin: 0 auto; /* 중앙 정렬 */
        }
        .main-btn:active { transform: translateY(6px); box-shadow: 0 0px 0px rgba(0,0,0,0.2); }
        
        /* 메인 버튼 안의 작은 텍스트 */
        .btn-sub-text {
            font-size: clamp(1rem, 2.5vw, 1.3rem);
            opacity: 0.9;
            margin-top: 5px;
            font-weight: normal;
        }

        .btn-group { display: flex; justify-content: center; flex-wrap: wrap; gap: 15px; margin-top: 10px; width: 100%; }

        /* 플로팅 홈 버튼 */
        .btn-home-floating {
            position: absolute;
            top: 3vmin; left: 3vmin;
            font-size: 2.2rem;
            background: var(--container-bg);
            border: 2px solid var(--primary);
            border-radius: 50%;
            width: 50px; height: 50px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 10px var(--shadow);
            z-index: 100;
            cursor: pointer;
            color: var(--text-color);
        }

        /* 설정 화면 */
        .settings-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; overflow-y: auto; padding: 10px; margin-bottom: 20px; }
        .settings-group {
            background: rgba(127, 143, 166, 0.1);
            padding: 15px;
            border-radius: 20px;
            font-size: clamp(1.1rem, 2.5vw, 1.4rem);
            border: 1px solid rgba(0,0,0,0.05);
        }
        body.dark-mode .settings-group { border-color: rgba(255,255,255,0.05); }
        .settings-group strong { display: block; margin-bottom: 10px; color: var(--secondary); font-size: 1.2em; border-bottom: 2px dashed rgba(0,0,0,0.1); padding-bottom: 5px; }
        body.dark-mode .settings-group strong { border-bottom-color: rgba(255,255,255,0.1); }
        .settings-group label { margin-right: 15px; cursor: pointer; display: inline-flex; align-items: center; margin-bottom: 8px; width: 100%; }
        .settings-group input[type="radio"], .settings-group input[type="checkbox"] { transform: scale(1.3); margin-right: 8px; accent-color: var(--secondary); }

        /* === 게임 영역 (1/2인 공통) === */
        .game-layout { display: flex; width: 100%; height: 100%; flex-direction: row; gap: 2vmin; }
        
        .player-area {
            flex: 1;
            display: flex; flex-direction: column;
            background: var(--container-bg);
            border-radius: 30px;
            padding: 3vmin;
            box-shadow: 0 10px 30px var(--shadow);
            min-width: 0; min-height: 0;
            border: 5px solid transparent;
            position: relative;
        }

        .single-mode .player-area { max-width: 800px; margin: auto; border: none; }
        .multi-mode .player-area:nth-child(1) { border-color: var(--p1-color); }
        .multi-mode .player-area:nth-child(2) { border-color: var(--p2-color); }

        .top-bar { 
            display: flex; justify-content: space-between; align-items: center;
            font-size: clamp(1.2rem, 2.5vw, 1.8rem); 
            margin-bottom: 1.5vh;
            padding: 8px 15px;
            background: rgba(127, 143, 166, 0.1);
            border-radius: 15px;
        }
        .player-badge { padding: 4px 10px; border-radius: 8px; color: white; }
        .p1-badge { background: var(--p1-color); color: #2d3436;}
        .p2-badge { background: var(--p2-color); color: #2d3436;}

        /* 문제 상자 */
        .question-box {
            flex-grow: 1; min-height: 20vh;
            background: var(--primary); color: white;
            border-radius: 20px;
            display: flex; align-items: center; justify-content: center;
            padding: 3vmin; margin-bottom: 2vh;
            box-shadow: inset 0 5px 15px rgba(0,0,0,0.15);
            text-align: center; word-break: keep-all; overflow-y: auto;
        }
        .question-text { font-size: clamp(1.6rem, 4vw, 3rem); line-height: 1.4; width: 100%; }
        .meaning-text { font-size: clamp(1.3rem, 3vw, 2.2rem); line-height: 1.5; display: block; }
        .highlight { color: #ffeaa7; font-size: 1.2em; text-shadow: 1px 1px 2px rgba(0,0,0,0.3); }
        .hint-label { font-size: 0.8em; color: #ffeaa7; display: block; margin-bottom: 8px; opacity: 0.9; }

        /* 보기 버튼 */
        .options-grid { display: grid; grid-template-columns: repeat(2, 1fr); grid-template-rows: repeat(2, 1fr); gap: 2vmin; height: 35vh; }
        .option-btn {
            background: var(--btn-bg); color: var(--text-color);
            border: 4px solid var(--btn-border);
            border-radius: 20px;
            font-size: clamp(1.3rem, 3vw, 2.2rem);
            display: flex; align-items: center; justify-content: center;
            padding: 1.5vmin; word-break: keep-all; line-height: 1.2;
            box-shadow: 0 6px 10px rgba(0,0,0,0.05);
        }
        .option-btn:active { transform: translateY(4px); box-shadow: none; }
        .option-btn.correct-anim { background-color: var(--correct) !important; color: white !important; border-color: var(--correct) !important; box-shadow: 0 0 15px rgba(0,184,148,0.5) !important; }
        .option-btn.wrong-anim { background-color: var(--wrong) !important; color: white !important; border-color: var(--wrong) !important; box-shadow: 0 0 15px rgba(214,48,49,0.5) !important; }

        /* 결과 화면 */
        .result-players { display: flex; width: 100%; justify-content: center; gap: 20px; margin-top: 15px; flex-wrap: wrap; }
        .result-box { flex: 1; min-width: 200px; background: rgba(127, 143, 166, 0.1); padding: 20px; border-radius: 25px; text-align: center; }
        .score-big { font-size: clamp(2.5rem, 5vw, 4rem); font-weight: bold; margin: 10px 0; }
        #winner-text { font-size: clamp(2rem, 4vw, 3rem); text-align: center; margin-top: 10px; display: none; font-weight: bold; }

        /* 오답 노트 화면 (스크린샷 최적화) */
        #note-capture-area {
            background: white;
            padding: 15px;
            border-radius: 15px;
            width: 100%;
        }
        #note-content-wrapper {
            color: #2d3436;
            width: 100%;
            /* 모바일 화면에 더 많이 담기도록 최대 높이 제한 해제 (스크롤 없이 쭉 렌더링되도록) */
            max-height: 60vh; 
            overflow-y: auto;
            text-align: left;
        }
        .note-item { border-bottom: 1px dashed #dfe6e9; padding: 10px 0; }
        .note-item:last-child { border-bottom: none; }
        .note-q { font-size: 1.3rem; font-weight: bold; color: #0984e3; margin-bottom: 4px; word-break: keep-all; line-height: 1.3; }
        .note-m { font-size: 1.1rem; color: #636e72; line-height: 1.3; margin-bottom: 4px; }
        /* 정답/오답 비교 영역 */
        .note-compare { font-size: 1.1rem; background: #f8f9fa; padding: 6px; border-radius: 8px; display: inline-block; width: 100%; box-sizing: border-box; }
        .note-compare span.wrong-ans { color: #d63031; text-decoration: line-through; margin-right: 10px; }
        .note-compare span.correct-ans { color: #00b894; font-weight: bold; }
        .note-title { text-align: center; font-size: 1.8rem; color: #2d3436; margin: 0 0 10px 0; border-bottom: 3px solid #fdcb6e; display: inline-block; padding-bottom: 5px; }

        @media (max-aspect-ratio: 3/4) {
            .game-layout.multi-mode { flex-direction: column; }
            .options-grid { height: 28vh; }
            .settings-grid { grid-template-columns: 1fr; }
            .main-btn { width: 100%; } /* 모바일 세로에선 버튼 꽉 차게 */
        }
    </style>
</head>
<body>

    <div id="home-screen" class="screen active">
        <div class="center-container">
            <h1>📚 속담 & 관용구 팡팡!</h1>
            <div class="subtitle">초등학생을 위한 재미있는 어휘력 키우기 게임</div>
            
            <div class="btn-group" style="flex-direction: column; align-items: center; gap: 15px;">
                <button class="main-btn" onclick="startGame('learn')" style="background: var(--correct);">
                    📖 학습 모드
                    <div class="btn-sub-text">(뜻 보고 맞히기)</div>
                </button>
                <button class="main-btn" onclick="startGame('single')" style="background: var(--primary);">
                    🎮 1인 퀴즈
                    <div class="btn-sub-text">(빈칸 채우기)</div>
                </button>
                <button class="main-btn" onclick="startGame('multi')" style="background: var(--accent);">
                    ⚔️ 2인 대결
                    <div class="btn-sub-text">(동시 터치 지원)</div>
                </button>
            </div>
            
            <button class="main-btn" onclick="openSettings()" style="margin-top: 30px; background: #636e72; width: 60%; font-size: clamp(1.2rem, 3vw, 1.8rem); flex-direction: row; gap: 5px;">⚙️ 게임 설정</button>
        </div>
    </div>

    <div id="settings-screen" class="screen">
        <div class="center-container">
            <h2>⚙️ 게임 설정</h2>
            
            <div class="settings-grid">
                <div class="settings-group">
                    <strong>📖 주제 세부 선택</strong>
                    <label><input type="radio" name="theme" value="all" checked> 🎲 전체 랜덤 섞기</label>
                    <label><input type="radio" name="theme" value="general"> 📜 일반 속담만</label>
                    <label><input type="radio" name="theme" value="animal"> 🐾 동물 관련 속담만</label>
                    <label><input type="radio" name="theme" value="idiom"> 🗣️ 관용구만</label>
                </div>

                <div class="settings-group">
                    <strong>🔢 문제 수 (1인당)</strong>
                    <label><input type="radio" name="count" value="10"> 10문제</label>
                    <label><input type="radio" name="count" value="20" checked> 20문제</label>
                    <label><input type="radio" name="count" value="30"> 30문제</label>
                    <label><input type="radio" name="count" value="50"> 50문제</label>
                </div>

                <div class="settings-group" style="grid-column: 1 / -1; display: flex; justify-content: space-around;">
                    <label style="width: auto;"><input type="checkbox" id="audio-toggle" checked> 🎵 효과음 켜기</label>
                    <label style="width: auto;"><input type="checkbox" id="dark-toggle" onchange="toggleDarkMode()"> 🌙 다크 모드</label>
                </div>
            </div>

            <button class="main-btn" onclick="closeSettings()" style="background: var(--correct); margin: 0 auto; width: 80%; flex-direction: row;">저장하고 뒤로 가기</button>
        </div>
    </div>

    <div id="game-screen" class="screen">
        <button class="btn-home-floating" onclick="goHomeConfirm()">🏠</button>

        <div id="game-layout" class="game-layout">
            <div id="p1-area" class="player-area">
                <div class="top-bar" style="padding-left: 55px;"> <span class="player-badge p1-badge" id="p1-badge">도전자 1</span>
                    <span><span id="p1-q-current">1</span>/<span id="q-total">20</span></span>
                    <span>점수: <span id="p1-score">0</span></span>
                </div>
                <div class="question-box">
                    <div id="p1-question" class="question-text">문제</div>
                </div>
                <div class="options-grid">
                    <button class="option-btn" onpointerdown="checkAnswer(1, 0)"></button>
                    <button class="option-btn" onpointerdown="checkAnswer(1, 1)"></button>
                    <button class="option-btn" onpointerdown="checkAnswer(1, 2)"></button>
                    <button class="option-btn" onpointerdown="checkAnswer(1, 3)"></button>
                </div>
            </div>

            <div id="p2-area" class="player-area" style="display: none;">
                <div class="top-bar">
                    <span class="player-badge p2-badge">도전자 2</span>
                    <span><span id="p2-q-current">1</span>/<span id="q-total-p2">20</span></span>
                    <span>점수: <span id="p2-score">0</span></span>
                </div>
                <div class="question-box">
                    <div id="p2-question" class="question-text">문제</div>
                </div>
                <div class="options-grid">
                    <button class="option-btn" onpointerdown="checkAnswer(2, 0)"></button>
                    <button class="option-btn" onpointerdown="checkAnswer(2, 1)"></button>
                    <button class="option-btn" onpointerdown="checkAnswer(2, 2)"></button>
                    <button class="option-btn" onpointerdown="checkAnswer(2, 3)"></button>
                </div>
            </div>
        </div>
    </div>

    <div id="result-screen" class="screen">
        <div class="center-container">
            <h1>게임 완료! 🎉</h1>
            <div id="winner-text">👑 도전자 1 승리!</div>

            <div class="result-players">
                <div class="result-box" id="p1-result">
                    <h3 style="color: var(--p1-color); font-size: 1.8rem; margin:0;">도전자 1</h3>
                    <div class="score-big" id="p1-final-score" style="color: var(--p1-color);">0점</div>
                    <p id="p1-feedback" style="font-size: 1.3rem; margin:0;">참 잘했어요!</p>
                </div>
                
                <div class="result-box" id="p2-result" style="display: none;">
                    <h3 style="color: var(--p2-color); font-size: 1.8rem; margin:0;">도전자 2</h3>
                    <div class="score-big" id="p2-final-score" style="color: var(--p2-color);">0점</div>
                    <p id="p2-feedback" style="font-size: 1.3rem; margin:0;">수고했어요!</p>
                </div>
            </div>

            <div class="btn-group" style="flex-direction: column; gap: 10px; margin-top: 20px;">
                <button class="main-btn" id="note-btn" onclick="showNoteScreen()" style="display:none; background:var(--accent); width: 80%; flex-direction: row; font-size: clamp(1.3rem, 3vw, 1.8rem);">📝 오답 노트 보기</button>
                <button class="main-btn" id="learn-btn" onclick="startLearningMode()" style="display:none; background:var(--correct); width: 80%; flex-direction: row; font-size: clamp(1.3rem, 3vw, 1.8rem);">📖 오답 복습 게임</button>
                <button class="main-btn" onclick="showScreen('home-screen')" style="width: 80%; flex-direction: row; font-size: clamp(1.3rem, 3vw, 1.8rem);">🏠 처음으로</button>
            </div>
        </div>
    </div>

    <div id="note-screen" class="screen">
        <button class="btn-home-floating" onclick="showScreen('result-screen')">🔙</button>
        <div class="center-container" style="padding: 15px; padding-top: 60px;">
            <div id="note-capture-area">
                <div style="text-align: center;"><h2 class="note-title">📝 나의 오답 노트</h2></div>
                <div id="note-content-wrapper">
                    </div>
            </div>
            
            <button class="main-btn" onclick="takeScreenshot()" style="background: #0984e3; margin-top: 15px; width: 90%; flex-direction: row; font-size: clamp(1.2rem, 3vw, 1.8rem);">📸 갤러리에 저장하기</button>
        </div>
    </div>

<script>
    // --- 100개의 속담/관용구 데이터 ---
    const allData = [
        // 동물 (33개)
        { t: "animal", q: "소 잃고 [ ] 고친다", a: "외양간", o: ["지붕", "울타리", "대문"], f: "소 잃고 외양간 고친다", m: "일이 이미 잘못된 뒤에는 손을 써도 소용이 없다는 뜻" },
        { t: "animal", q: "고래 싸움에 [ ] 등 터진다", a: "새우", o: ["오징어", "게", "물고기"], f: "고래 싸움에 새우 등 터진다", m: "강자들 싸움에 약자가 피해를 본다는 뜻" },
        { t: "animal", q: "[ ]도 나무에서 떨어질 때가 있다", a: "원숭이", o: ["고양이", "다람쥐", "청설모"], f: "원숭이도 나무에서 떨어질 때가 있다", m: "아무리 익숙하고 잘하는 사람이라도 실수할 때가 있다는 뜻" },
        { t: "animal", q: "하룻강아지 [ ] 무서운 줄 모른다", a: "범", o: ["개", "사자", "늑대"], f: "하룻강아지 범 무서운 줄 모른다", m: "철없이 겁 없이 덤비는 모습을 이르는 말" },
        { t: "animal", q: "서당 [ ] 삼 년이면 풍월을 읊는다", a: "개", o: ["고양이", "소", "쥐"], f: "서당 개 삼 년이면 풍월을 읊는다", m: "어떤 분야에 지식이 없어도 그 환경에 오래 있으면 자연스럽게 알게 된다는 뜻" },

        { t: "general", q: "빈 수레가 더 [ ]하다", a: "요란", o: ["조용", "무겁", "가볍"], f: "빈 수레가 더 요란하다", m: "실속 없는 사람이 겉으로 더 떠든다는 뜻" },

        { t: "general", q: "윗물이 맑아야 [ ]이 맑다", a: "아랫물", o: ["강물", "바닷물", "냇물"], f: "윗물이 맑아야 아랫물이 맑다", m: "윗사람이 잘해야 아랫사람도 잘한다는 뜻" },
        { t: "general", q: "하늘의 [ ] 따기", a: "별", o: ["달", "해", "구름"], f: "하늘의 별 따기", m: "어떤 일을 이루기가 매우 어렵다는 뜻" },
        { t: "general", q: "호미로 막을 것을 [ ]로 막는다", a: "가래", o: ["삽", "포크레인", "손"], f: "호미로 막을 것을 가래로 막는다", m: "작은 일일 때 처리하지 않아 나중에 큰 힘을 들이게 된다는 뜻" }
    ];

    let settings = { theme: 'all', count: 20, audio: true, isDark: false };
    let gameMode = 'single';
    let players = {
        1: { score: 0, qIndex: 0, questions: [], failed: [], active: false },
        2: { score: 0, qIndex: 0, questions: [], failed: [], active: false }
    };

    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playSound(type) {
        if (!settings.audio) return;
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        if (type === 'correct') {
            osc.type = 'sine'; osc.frequency.setValueAtTime(600, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(1000, audioCtx.currentTime + 0.1);
            gain.gain.setValueAtTime(0.2, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
            osc.start(); osc.stop(audioCtx.currentTime + 0.2);
        } else {
            osc.type = 'sawtooth'; osc.frequency.setValueAtTime(300, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(150, audioCtx.currentTime + 0.2);
            gain.gain.setValueAtTime(0.2, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
            osc.start(); osc.stop(audioCtx.currentTime + 0.2);
        }
    }

    function showScreen(screenId) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(screenId).classList.add('active');
    }

    function openSettings() { showScreen('settings-screen'); }
    function closeSettings() {
        settings.theme = document.querySelector('input[name="theme"]:checked').value;
        settings.count = parseInt(document.querySelector('input[name="count"]:checked').value);
        settings.audio = document.getElementById('audio-toggle').checked;
        showScreen('home-screen');
    }
    function toggleDarkMode() {
        settings.isDark = document.getElementById('dark-toggle').checked;
        if(settings.isDark) document.body.classList.add('dark-mode');
        else document.body.classList.remove('dark-mode');
    }

    function goHomeConfirm() {
        if (confirm('정말 게임을 멈추고 처음으로 돌아가시겠습니까? 기록은 저장되지 않습니다.')) {
            showScreen('home-screen');
        }
    }

    function startGame(mode) {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        gameMode = mode;
        const gl = document.getElementById('game-layout');
        
        if (mode === 'multi') {
            gl.className = 'game-layout multi-mode';
            document.getElementById('p2-area').style.display = 'flex';
            document.getElementById('p1-badge').innerText = "도전자 1";
        } else {
            gl.className = 'game-layout single-mode';
            document.getElementById('p2-area').style.display = 'none';
            document.getElementById('p1-badge').innerText = mode === 'learn' ? "📖 학습 모드" : "🎮 1인 퀴즈";
        }

        let pool = allData.filter(d => settings.theme === 'all' || d.t === settings.theme);
        if(pool.length < settings.count) pool = [...allData]; 

        [1, 2].forEach(p => {
            players[p] = { 
                score: 0, qIndex: 0, failed: [], active: true,
                questions: [...pool].sort(() => Math.random() - 0.5).slice(0, settings.count)
            };
            document.getElementById(`p${p}-score`).innerText = "0";
            if(p===1 || mode==='multi') document.getElementById(p===1 ? 'q-total' : 'q-total-p2').innerText = settings.count;
        });

        showScreen('game-screen');
        loadQuestion(1);
        if (mode === 'multi') loadQuestion(2);
    }

    function startLearningMode() {
        gameMode = 'learn';
        document.getElementById('game-layout').className = 'game-layout single-mode';
        document.getElementById('p2-area').style.display = 'none';
        document.getElementById('p1-badge').innerText = "📖 오답 복습";

        let combinedFails = [...players[1].failed, ...(players[2] ? players[2].failed : [])];
        let uniqueFails = [];
        let seen = new Set();
        // 오답 객체 재구성
        for (let item of combinedFails) {
            if (!seen.has(item.f)) { seen.add(item.f); uniqueFails.push(item); }
        }
        
        players[1] = { 
            score: 0, qIndex: 0, failed: [], active: true,
            questions: uniqueFails.sort(() => Math.random() - 0.5)
        };
        
        document.getElementById('q-total').innerText = players[1].questions.length;
        document.getElementById('p1-score').innerText = "-";
        
        showScreen('game-screen');
        loadQuestion(1);
    }

    function loadQuestion(p) {
        if (!players[p].active) return;
        const qData = players[p].questions[players[p].qIndex];
        document.getElementById(`p${p}-q-current`).innerText = players[p].qIndex + 1;
        const qBox = document.getElementById(`p${p}-question`);
        const buttons = document.querySelectorAll(`#p${p}-area .option-btn`);
        
        buttons.forEach(btn => { btn.className = 'option-btn'; btn.style.pointerEvents = 'auto'; });

        if (gameMode !== 'learn') {
            let formattedQ = qData.q.replace("[ ]", "<span class='highlight'>[ &nbsp; ]</span>");
            qBox.innerHTML = `<span class="question-text">${formattedQ}</span>`;
            let ops = [qData.a, ...qData.o.slice(0,3)].sort(() => Math.random() - 0.5);
            buttons.forEach((btn, i) => { btn.innerText = ops[i]; });
        } else {
            qBox.innerHTML = `<span class="hint-label">다음 뜻을 가진 속담/관용구는?</span><span class="meaning-text">${qData.m}</span>`;
            let wrongOps = allData.filter(d => d.f !== qData.f).sort(() => Math.random() - 0.5).slice(0,3).map(d => d.f);
            let ops = [qData.f, ...wrongOps].sort(() => Math.random() - 0.5);
            buttons.forEach((btn, i) => { btn.innerText = ops[i]; });
        }
    }

    function checkAnswer(p, btnIndex) {
        if (!players[p].active) return;
        players[p].active = false;
        
        const buttons = document.querySelectorAll(`#p${p}-area .option-btn`);
        const selectedBtn = buttons[btnIndex];
        const qData = players[p].questions[players[p].qIndex];
        
        let isCorrect = (gameMode !== 'learn') ? (selectedBtn.innerText === qData.a) : (selectedBtn.innerText === qData.f);

        buttons.forEach(b => b.style.pointerEvents = 'none');

        if (isCorrect) {
            playSound('correct'); selectedBtn.classList.add('correct-anim');
            if (gameMode !== 'learn') {
                players[p].score += 10; document.getElementById(`p${p}-score`).innerText = players[p].score;
            }
        } else {
            playSound('wrong'); selectedBtn.classList.add('wrong-anim');
            // 오답 노트에 저장할 때 학생이 선택한 오답(selectedBtn.innerText)도 함께 저장
            if (gameMode !== 'learn') {
                let failData = { ...qData, userWrongAnswer: selectedBtn.innerText };
                players[p].failed.push(failData);
            }
            
            let ansText = (gameMode !== 'learn') ? qData.a : qData.f;
            buttons.forEach(b => { if (b.innerText === ansText) b.classList.add('correct-anim'); });
        }

        setTimeout(() => {
            players[p].qIndex++;
            if (players[p].qIndex < players[p].questions.length) {
                players[p].active = true; loadQuestion(p);
            } else { checkEndGame(); }
        }, 1200);
    }

    function checkEndGame() {
        if (gameMode === 'multi') {
            if (players[1].qIndex >= players[1].questions.length && players[2].qIndex >= players[2].questions.length) showResults();
        } else {
            if (players[1].qIndex >= players[1].questions.length) showResults();
        }
    }

    function showResults() {
        showScreen('result-screen');
        const winnerText = document.getElementById('winner-text');
        const p2ResultBox = document.getElementById('p2-result');
        const learnBtn = document.getElementById('learn-btn');
        const noteBtn = document.getElementById('note-btn');
        
        document.getElementById('p1-final-score').innerText = (gameMode === 'learn') ? "완료!" : `${players[1].score}점`;

        let hasFails = players[1].failed.length > 0 || (gameMode === 'multi' && players[2].failed.length > 0);

        if (gameMode === 'multi') {
            winnerText.style.display = 'block'; p2ResultBox.style.display = 'block';
            document.getElementById('p2-final-score').innerText = `${players[2].score}점`;
            if (players[1].score > players[2].score) { winnerText.innerText = "👑 도전자 1 승리!"; winnerText.style.color = "var(--p1-color)"; }
            else if (players[2].score > players[1].score) { winnerText.innerText = "👑 도전자 2 승리!"; winnerText.style.color = "var(--p2-color)"; }
            else { winnerText.innerText = "🤝 무승부!"; winnerText.style.color = "var(--correct)"; }
        } else {
            winnerText.style.display = 'none'; p2ResultBox.style.display = 'none';
            if (gameMode === 'learn') {
                document.getElementById('p1-feedback').innerText = "복습을 완료했습니다!";
            } else {
                const rate = players[1].score / (settings.count * 10);
                if (rate < 0.5 && hasFails) document.getElementById('p1-feedback').innerText = "조금 더 연습이 필요해요!";
                else if (rate === 1) document.getElementById('p1-feedback').innerText = "완벽해요! 어휘력 대장!";
                else document.getElementById('p1-feedback').innerText = "참 잘했어요!";
            }
        }

        if (hasFails && gameMode !== 'learn') {
            learnBtn.style.display = 'flex';
            noteBtn.style.display = 'flex';
        } else {
            learnBtn.style.display = 'none';
            noteBtn.style.display = 'none';
        }
    }

    function showNoteScreen() {
        showScreen('note-screen');
        const wrapper = document.getElementById('note-content-wrapper');
        wrapper.innerHTML = '';
        
        let combinedFails = (gameMode === 'multi') ? [...players[1].failed, ...players[2].failed] : [...players[1].failed];
        
        let uniqueFails = [];
        let seen = new Set();
        for (let item of combinedFails) {
            if (!seen.has(item.f)) { seen.add(item.f); uniqueFails.push(item); }
        }
        
        if (uniqueFails.length === 0) {
            wrapper.innerHTML = '<div style="text-align:center; padding: 20px; font-size: 1.2rem;">틀린 문제가 없네요! 정말 대단해요! 👍</div>';
            return;
        }

        uniqueFails.forEach((item, index) => {
            let div = document.createElement('div');
            div.className = 'note-item';
            
            // 정답/오답 비교 문구 생성
            let compareHTML = '';
            if (item.userWrongAnswer) {
                compareHTML = `
                    <div class="note-compare">
                        나의 오답: <span class="wrong-ans">❌ ${item.userWrongAnswer}</span> ➔ 정답: <span class="correct-ans">⭕️ ${item.a}</span>
                    </div>
                `;
            }

            div.innerHTML = `
                <div class="note-q">${index + 1}. ${item.f}</div>
                <div class="note-m">💡 뜻: ${item.m}</div>
                ${compareHTML}
            `;
            wrapper.appendChild(div);
        });
    }

    function takeScreenshot() {
        const target = document.getElementById('note-capture-area');
        
        // CSS에서 높이 제한을 해제했으므로 한 번에 렌더링 됨
        setTimeout(() => {
            html2canvas(target, { backgroundColor: '#ffffff', scale: 2 }).then(canvas => {
                let link = document.createElement('a');
                link.download = '나의_속담_오답노트.png';
                link.href = canvas.toDataURL('image/png');
                link.click();
            }).catch(err => {
                alert("스크린샷 저장 중 오류가 발생했습니다: " + err);
            });
        }, 300);
    }

    toggleDarkMode();
</script>
