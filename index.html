<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>초등 속담/관용구 팡팡!</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Jua&display=swap');

        :root {
            --bg-color: #f0f9ff;
            --container-bg: #ffffff;
            --text-color: #2b2d42;
            --primary: #4cc9f0;
            --secondary: #4895ef;
            --accent: #f72585;
            --correct: #4caf50;
            --wrong: #f44336;
            --btn-bg: #ffffff;
            --btn-border: #4cc9f0;
            --shadow: rgba(0,0,0,0.1);
            
            /* 플레이어 색상 */
            --p1-color: #ff9f43;
            --p2-color: #0abde3;
        }

        body.dark-mode {
            --bg-color: #1a1a2e;
            --container-bg: #16213e;
            --text-color: #e94560;
            --primary: #0f3460;
            --secondary: #e94560;
            --accent: #4cc9f0;
            --btn-bg: #1a1a2e;
            --btn-border: #e94560;
            --shadow: rgba(255,255,255,0.05);
            color: white;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Jua', sans-serif; /* 귀여운 폰트 적용 */
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden; /* 스크롤 방지 */
            transition: background-color 0.3s;
            touch-action: none; /* 멀티 터치 제스처 방지 (확대 등) */
            -webkit-user-select: none;
            user-select: none;
        }

        .screen {
            display: none;
            width: 100vw;
            height: 100vh;
            background: var(--bg-color);
            flex-direction: column;
            position: absolute;
            top: 0; left: 0;
        }

        .screen.active { display: flex; }

        /* 중앙 정렬 컨테이너 (홈, 설정, 단일게임용) */
        .center-container {
            width: 95%;
            max-width: 1200px;
            max-height: 95vh;
            margin: auto;
            background: var(--container-bg);
            border-radius: 30px;
            box-shadow: 0 10px 30px var(--shadow);
            padding: 3vmin;
            display: flex;
            flex-direction: column;
        }

        h1 { font-size: clamp(3rem, 6vw, 5rem); text-align: center; color: var(--accent); text-shadow: 2px 2px 0px white; margin-bottom: 10px; }
        h2 { font-size: clamp(2rem, 4vw, 3rem); text-align: center; margin-top: 0; }

        button {
            font-family: inherit;
            cursor: pointer;
            border-radius: 20px;
            border: none;
            font-weight: bold;
            transition: transform 0.1s;
        }
        button:active { transform: scale(0.95); }
        
        .main-btn {
            background: var(--secondary);
            color: white;
            font-size: clamp(1.8rem, 3.5vw, 2.5rem);
            padding: 15px 30px;
            margin: 10px;
            box-shadow: 0 6px 0px calc(var(--secondary) - #222);
        }
        .main-btn:active { transform: translateY(6px); box-shadow: none; }

        .btn-group { display: flex; justify-content: center; flex-wrap: wrap; gap: 15px; margin-top: 20px; }

        /* 설정 화면 */
        .settings-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            overflow-y: auto;
            padding: 10px;
        }
        .settings-group {
            background: rgba(0,0,0,0.03);
            padding: 20px;
            border-radius: 20px;
            font-size: clamp(1.2rem, 2.5vw, 1.8rem);
        }
        .settings-group label { margin-right: 15px; cursor: pointer; display: inline-block; margin-bottom: 10px; }
        .settings-group input[type="radio"], .settings-group input[type="checkbox"] { transform: scale(1.5); margin-right: 8px; }

        /* === 게임 영역 공통 === */
        .game-layout {
            display: flex;
            width: 100vw;
            height: 100vh;
            flex-direction: row; /* 기본적으로 가로 분할 준비 */
        }

        .player-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 2vmin;
            min-width: 0; min-height: 0;
            border: 5px solid transparent;
            transition: border-color 0.3s;
        }

        /* 1인용일 때 중앙 정렬 */
        .single-mode .player-area {
            max-width: 1200px;
            margin: 0 auto;
            background: var(--container-bg);
            border-radius: 30px;
            box-shadow: 0 10px 30px var(--shadow);
            margin-top: 2vh;
            margin-bottom: 2vh;
            border: none;
        }

        /* 2인용 색상 구분 */
        .multi-mode .player-area:nth-child(1) { background-color: #fff3e0; border-color: var(--p1-color); }
        .multi-mode .player-area:nth-child(2) { background-color: #e0f7fa; border-color: var(--p2-color); border-left: 10px solid #ccc; }
        body.dark-mode .multi-mode .player-area:nth-child(1) { background-color: #3e2723; }
        body.dark-mode .multi-mode .player-area:nth-child(2) { background-color: #004d40; }

        .top-bar { 
            display: flex; justify-content: space-between; align-items: center;
            font-size: clamp(1.5rem, 3vw, 2.5rem); 
            margin-bottom: 1vh;
            background: rgba(255,255,255,0.8);
            padding: 10px 20px;
            border-radius: 15px;
        }
        body.dark-mode .top-bar { background: rgba(0,0,0,0.5); }

        .player-badge { padding: 5px 15px; border-radius: 10px; color: white; }
        .p1-badge { background: var(--p1-color); }
        .p2-badge { background: var(--p2-color); }

        /* 문제 영역 - 말줄임 방지 및 크기 조절 */
        .question-box {
            flex-grow: 1;
            min-height: 25vh;
            background: var(--primary);
            color: white;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 3vmin;
            margin-bottom: 2vh;
            box-shadow: inset 0 5px 10px rgba(0,0,0,0.2);
            text-align: center;
            word-break: keep-all;
            overflow-y: auto; /* 내용이 너무 길면 스크롤되도록 (안전장치) */
        }
        
        .question-text {
            font-size: clamp(1.8rem, 4vw, 4rem);
            line-height: 1.4;
            width: 100%;
        }
        
        /* 학습 모드에서 뜻풀이 텍스트 (글자가 많으므로 약간 작게) */
        .meaning-text {
            font-size: clamp(1.5rem, 3.5vw, 3rem);
            line-height: 1.5;
            display: block;
        }

        .highlight { color: #ffeaa7; font-size: 1.2em; }
        .hint-label { font-size: 0.6em; color: #ffeaa7; display: block; margin-bottom: 10px; }

        /* 보기 버튼 영역 */
        .options-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            grid-template-rows: repeat(2, 1fr);
            gap: 2vmin;
            height: 40vh; /* 보기 버튼 높이 확보 */
        }

        .option-btn {
            background: var(--btn-bg);
            border: 6px solid var(--btn-border);
            color: var(--text-color);
            font-size: clamp(1.5rem, 3.5vw, 3rem);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2vmin;
            word-break: keep-all;
            line-height: 1.3;
            box-shadow: 0 4px 0px var(--btn-border);
        }
        .option-btn:active { transform: translateY(4px); box-shadow: none; }

        .option-btn.correct-anim { background-color: var(--correct) !important; color: white !important; border-color: var(--correct) !important; box-shadow: 0 4px 0px #2e7d32 !important; }
        .option-btn.wrong-anim { background-color: var(--wrong) !important; color: white !important; border-color: var(--wrong) !important; box-shadow: 0 4px 0px #c62828 !important; }

        /* 결과 화면 */
        #result-content { display: flex; flex-direction: column; align-items: center; width: 100%; }
        .result-players { display: flex; width: 100%; justify-content: space-around; gap: 20px; margin-top: 20px; }
        .result-box {
            flex: 1; background: rgba(0,0,0,0.05); padding: 20px; border-radius: 20px; text-align: center;
        }
        body.dark-mode .result-box { background: rgba(255,255,255,0.1); }
        .score-big { font-size: clamp(3rem, 6vw, 5rem); font-weight: bold; margin: 10px 0; }
        
        #winner-text { font-size: 3rem; color: var(--accent); margin-top: 20px; display: none; }

        /* 세로 모드 대응 (태블릿/스마트폰 세로일 때 위아래 분할) */
        @media (max-aspect-ratio: 3/4) {
            .game-layout.multi-mode { flex-direction: column; }
            .multi-mode .player-area:nth-child(2) { border-left: none; border-top: 10px solid #ccc; }
            .options-grid { height: 35vh; }
            .settings-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div id="home-screen" class="screen active">
        <div class="center-container" style="justify-content: center;">
            <h1>📚 속담 & 관용구 팡팡!</h1>
            <p style="text-align: center; font-size: 1.5rem; color: #666;">초등학생을 위한 재미있는 어휘력 키우기</p>
            
            <div class="btn-group" style="margin-top: 40px;">
                <button class="main-btn" onclick="startGame('learn')" style="background: var(--correct); --secondary: var(--correct);">📖 학습 모드<br><span style="font-size: 1rem">(뜻 보고 맞히기)</span></button>
                <button class="main-btn" onclick="startGame('single')" style="background: var(--primary); --secondary: var(--primary);">🎮 1인 퀴즈<br><span style="font-size: 1rem">(빈칸 채우기)</span></button>
                <button class="main-btn" onclick="startGame('multi')" style="background: var(--accent); --secondary: var(--accent);">⚔️ 2인 대결<br><span style="font-size: 1rem">(전자칠판/태블릿)</span></button>
            </div>
            
            <button class="main-btn" onclick="openSettings()" style="margin-top: 30px; background: #636e72; --secondary: #636e72;">⚙️ 설정</button>
        </div>
    </div>

    <div id="settings-screen" class="screen">
        <div class="center-container">
            <h2>⚙️ 게임 설정</h2>
            
            <div class="settings-grid">
                <div class="settings-group">
                    <strong>📖 주제 선택:</strong><br>
                    <label><input type="radio" name="theme" value="all" checked> 랜덤 섞기</label><br>
                    <label><input type="radio" name="theme" value="animal"> 🐾 동물 관련 속담</label><br>
                    <label><input type="radio" name="theme" value="idiom"> 🗣️ 관용구 모음</label>
                </div>

                <div class="settings-group">
                    <strong>🔢 문제 수 (1인당):</strong><br>
                    <label><input type="radio" name="count" value="10"> 10문제</label>
                    <label><input type="radio" name="count" value="20" checked> 20문제</label>
                    <label><input type="radio" name="count" value="30"> 30문제</label>
                    <label><input type="radio" name="count" value="50"> 50문제</label>
                </div>

                <div class="settings-group" style="grid-column: 1 / -1;">
                    <strong>🔊 기타 설정:</strong><br>
                    <label><input type="checkbox" id="audio-toggle" checked> 🎵 효과음 켜기</label>
                    <label><input type="checkbox" id="dark-toggle" onchange="toggleDarkMode()"> 🌙 다크 모드</label>
                </div>
            </div>

            <button class="main-btn" onclick="closeSettings()" style="margin-top: auto; background: var(--correct); --secondary: var(--correct);">저장하고 뒤로 가기</button>
        </div>
    </div>

    <div id="game-screen" class="screen">
        <div id="game-layout" class="game-layout">
            <div id="p1-area" class="player-area">
                <div class="top-bar">
                    <span class="player-badge p1-badge" id="p1-badge">도전자 1</span>
                    <span>문제: <span id="p1-q-current">1</span> / <span id="q-total">20</span></span>
                    <span>점수: <span id="p1-score">0</span></span>
                </div>
                <div class="question-box">
                    <div id="p1-question" class="question-text">문제</div>
                </div>
                <div class="options-grid">
                    <button class="option-btn" onpointerdown="checkAnswer(1, 0)"></button>
                    <button class="option-btn" onpointerdown="checkAnswer(1, 1)"></button>
                    <button class="option-btn" onpointerdown="checkAnswer(1, 2)"></button>
                    <button class="option-btn" onpointerdown="checkAnswer(1, 3)"></button>
                </div>
            </div>

            <div id="p2-area" class="player-area" style="display: none;">
                <div class="top-bar">
                    <span class="player-badge p2-badge">도전자 2</span>
                    <span>문제: <span id="p2-q-current">1</span> / <span id="q-total-p2">20</span></span>
                    <span>점수: <span id="p2-score">0</span></span>
                </div>
                <div class="question-box">
                    <div id="p2-question" class="question-text">문제</div>
                </div>
                <div class="options-grid">
                    <button class="option-btn" onpointerdown="checkAnswer(2, 0)"></button>
                    <button class="option-btn" onpointerdown="checkAnswer(2, 1)"></button>
                    <button class="option-btn" onpointerdown="checkAnswer(2, 2)"></button>
                    <button class="option-btn" onpointerdown="checkAnswer(2, 3)"></button>
                </div>
            </div>
        </div>
    </div>

    <div id="result-screen" class="screen">
        <div class="center-container">
            <h1>게임 끝! 🎉</h1>
            
            <div id="winner-text">👑 도전자 1 승리!</div>

            <div class="result-players">
                <div class="result-box" id="p1-result">
                    <h3 style="color: var(--p1-color); font-size: 2rem;">도전자 1</h3>
                    <div class="score-big" id="p1-final-score" style="color: var(--p1-color);">0점</div>
                    <p id="p1-feedback">참 잘했어요!</p>
                </div>
                
                <div class="result-box" id="p2-result" style="display: none;">
                    <h3 style="color: var(--p2-color); font-size: 2rem;">도전자 2</h3>
                    <div class="score-big" id="p2-final-score" style="color: var(--p2-color);">0점</div>
                    <p id="p2-feedback">수고했어요!</p>
                </div>
            </div>

            <div class="btn-group" style="margin-top: 30px;">
                <button class="main-btn" id="learn-btn" onclick="startLearningMode()" style="display:none; background:var(--accent); --secondary: var(--accent);">📖 틀린 문제 다시 보기</button>
                <button class="main-btn" onclick="showScreen('home-screen')">🏠 처음으로</button>
            </div>
        </div>
    </div>

        { t: "general", q: "남의 [ ]이 더 커 보인다", a: "떡", o: ["집", "차", "옷"], f: "남의 떡이 더 커 보인다", m: "내 것보다 남의 것이 더 좋아 보인다는 뜻" },
        { t: "general", q: "다 된 [ ]에 재 빠뜨리기", a: "죽", o: ["밥", "국", "찌개"], f: "다 된 죽에 재 빠뜨리기", m: "거의 다 완성된 일을 망친다는 뜻" },
        { t: "general", q: "말 한마디에 [ ] 빚도 갚는다", a: "천 냥", o: ["백 냥", "만 냥", "십 냥"], f: "말 한마디에 천 냥 빚도 갚는다", m: "말만 잘하면 어려운 일도 쉽게 해결할 수 있다는 뜻" },
        { t: "general", q: "매도 [ ] 맞는 게 낫다", a: "먼저", o: ["나중에", "살살", "세게"], f: "매도 먼저 맞는 게 낫다", m: "어차피 겪어야 할 괴로움이라면 일찍 겪는 것이 낫다는 뜻" },
        { t: "general", q: "모로 가도 [ ]만 가면 된다", a: "서울", o: ["부산", "학교", "집"], f: "모로 가도 서울만 가면 된다", m: "방법이 어찌 되었든 목적만 이루면 된다는 뜻" },
        { t: "general", q: "바늘 도둑이 [ ] 도둑 된다", a: "소", o: ["말", "돼지", "집"], f: "바늘 도둑이 소 도둑 된다", m: "작은 나쁜 짓도 자꾸 하면 결국 큰 죄를 짓게 된다는 뜻" },
        { t: "general", q: "비 온 뒤에 [ ]이 굳어진다", a: "땅", o: ["돌", "나무", "하늘"], f: "비 온 뒤에 땅이 굳어진다", m: "시련을 겪은 뒤에 더욱 강해진다는 뜻" },
        { t: "general", q: "빈 수레가 더 [ ]하다", a: "요란", o: ["조용", "무겁", "가볍"], f: "빈 수레가 더 요란하다", m: "실속 없는 사람이 겉으로 더 떠든다는 뜻" },
        { t: "general", q: "우물을 파도 [ ] 우물을 파라", a: "한", o: ["두", "깊은", "넓은"], f: "우물을 파도 한 우물을 파라", m: "일을 이리저리 벌이지 말고 한 가지 일에 집중하라는 뜻" },
        { t: "general", q: "윗물이 맑아야 [ ]이 맑다", a: "아랫물", o: ["강물", "바닷물", "냇물"], f: "윗물이 맑아야 아랫물이 맑다", m: "윗사람이 잘해야 아랫사람도 잘한다는 뜻" },
        { t: "general", q: "하늘의 [ ] 따기", a: "별", o: ["달", "해", "구름"], f: "하늘의 별 따기", m: "어떤 일을 이루기가 매우 어렵다는 뜻" },
        { t: "general", q: "호미로 막을 것을 [ ]로 막는다", a: "가래", o: ["삽", "포크레인", "손"], f: "호미로 막을 것을 가래로 막는다", m: "작은 일일 때 처리하지 않아 나중에 큰 힘을 들이게 된다는 뜻" }
    ];

    // --- 게임 상태 관리 ---
    let settings = { theme: 'all', count: 20, audio: true, isDark: false };
    let gameMode = 'single'; // 'learn', 'single', 'multi'
    
    // 플레이어별 상태
    let players = {
        1: { score: 0, qIndex: 0, questions: [], failed: [], active: false },
        2: { score: 0, qIndex: 0, questions: [], failed: [], active: false }
    };

    // --- 오디오 시스템 ---
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playSound(type) {
        if (!settings.audio) return;
        if (audioCtx.state === 'suspended') audioCtx.resume();
        
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);

        if (type === 'correct') {
            osc.type = 'sine';
            osc.frequency.setValueAtTime(600, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(1000, audioCtx.currentTime + 0.1);
            gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
            osc.start(); osc.stop(audioCtx.currentTime + 0.2);
        } else {
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(300, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(150, audioCtx.currentTime + 0.2);
            gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
            osc.start(); osc.stop(audioCtx.currentTime + 0.2);
        }
    }

    // --- 화면 및 설정 로직 ---
    function showScreen(screenId) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(screenId).classList.add('active');
    }

    function openSettings() { showScreen('settings-screen'); }
    
    function closeSettings() {
        settings.theme = document.querySelector('input[name="theme"]:checked').value;
        settings.count = parseInt(document.querySelector('input[name="count"]:checked').value);
        settings.audio = document.getElementById('audio-toggle').checked;
        showScreen('home-screen');
    }

    function toggleDarkMode() {
        settings.isDark = document.getElementById('dark-toggle').checked;
        if(settings.isDark) document.body.classList.add('dark-mode');
        else document.body.classList.remove('dark-mode');
    }

    // --- 게임 시작 로직 ---
    function startGame(mode) {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        gameMode = mode;
        const gl = document.getElementById('game-layout');
        
        // 레이아웃 변경 (1인용 vs 2인용)
        if (mode === 'multi') {
            gl.className = 'game-layout multi-mode';
            document.getElementById('p2-area').style.display = 'flex';
            document.getElementById('p1-badge').innerText = "도전자 1";
        } else {
            gl.className = 'game-layout single-mode';
            document.getElementById('p2-area').style.display = 'none';
            document.getElementById('p1-badge').innerText = mode === 'learn' ? "📖 학습 모드" : "🎮 1인 퀴즈";
        }

        // 데이터 섞기
        let pool = allData.filter(d => settings.theme === 'all' || d.t === settings.theme);
        if(pool.length < settings.count) pool = [...allData]; 

        // 플레이어 초기화
        [1, 2].forEach(p => {
            players[p] = { 
                score: 0, qIndex: 0, failed: [], active: true,
                questions: [...pool].sort(() => Math.random() - 0.5).slice(0, settings.count)
            };
            document.getElementById(`p${p}-score`).innerText = "0";
            if(p===1 || mode==='multi') document.getElementById(p===1 ? 'q-total' : 'q-total-p2').innerText = settings.count;
        });

        showScreen('game-screen');
        loadQuestion(1);
        if (mode === 'multi') loadQuestion(2);
    }

    // --- 오답 노트 기반 학습 시작 ---
    function startLearningMode() {
        gameMode = 'learn';
        document.getElementById('game-layout').className = 'game-layout single-mode';
        document.getElementById('p2-area').style.display = 'none';
        document.getElementById('p1-badge').innerText = "📖 오답 복습";

        // P1과 P2의 오답을 합쳐서 중복 제거 후 문제 배열 생성
        let combinedFails = [...players[1].failed, ...(players[2] ? players[2].failed : [])];
        let uniqueFails = [...new Set(combinedFails)];
        
        players[1] = { 
            score: 0, qIndex: 0, failed: [], active: true,
            questions: uniqueFails.sort(() => Math.random() - 0.5)
        };
        
        document.getElementById('q-total').innerText = players[1].questions.length;
        document.getElementById('p1-score').innerText = "-";
        
        showScreen('game-screen');
        loadQuestion(1);
    }

    // --- 문제 로드 (플레이어 독립적) ---
    function loadQuestion(p) {
        if (!players[p].active) return;
        
        const qData = players[p].questions[players[p].qIndex];
        document.getElementById(`p${p}-q-current`).innerText = players[p].qIndex + 1;
        
        const qBox = document.getElementById(`p${p}-question`);
        const buttons = document.querySelectorAll(`#p${p}-area .option-btn`);
        
        // 버튼 초기화
        buttons.forEach(btn => {
            btn.className = 'option-btn';
            btn.style.pointerEvents = 'auto'; // 터치 활성화
        });

        if (gameMode !== 'learn') {
            // 퀴즈 모드: 빈칸 채우기
            let formattedQ = qData.q.replace("[ ]", "<span class='highlight'>[ &nbsp; ]</span>");
            qBox.innerHTML = `<span class="question-text">${formattedQ}</span>`;

            let ops = [qData.a, ...qData.o.slice(0,3)].sort(() => Math.random() - 0.5);
            buttons.forEach((btn, i) => { btn.innerText = ops[i]; });
        } else {
            // 학습 모드: 뜻을 보고 긴 속담 맞히기 (말줄임 방지를 위해 CSS에서 처리 완료)
            qBox.innerHTML = `
                <span class="hint-label">다음 뜻을 가진 속담/관용구는?</span>
                <span class="meaning-text">${qData.m}</span>
            `;
            
            // 정답 1개 + 다른 문제의 정답(f) 3개 섞기
            let wrongOps = allData.filter(d => d.f !== qData.f).sort(() => Math.random() - 0.5).slice(0,3).map(d => d.f);
            let ops = [qData.f, ...wrongOps].sort(() => Math.random() - 0.5);
            
            buttons.forEach((btn, i) => { btn.innerText = ops[i]; });
        }
    }

    // --- 정답 체크 (멀티 터치 대응 onpointerdown 이벤트 사용) ---
    function checkAnswer(p, btnIndex) {
        if (!players[p].active) return;
        players[p].active = false; // 중복 터치 방지
        
        const buttons = document.querySelectorAll(`#p${p}-area .option-btn`);
        const selectedBtn = buttons[btnIndex];
        const qData = players[p].questions[players[p].qIndex];
        
        let isCorrect = (gameMode !== 'learn') ? (selectedBtn.innerText === qData.a) : (selectedBtn.innerText === qData.f);

        buttons.forEach(b => b.style.pointerEvents = 'none');

        if (isCorrect) {
            playSound('correct');
            selectedBtn.classList.add('correct-anim');
            if (gameMode !== 'learn') {
                players[p].score += 10;
                document.getElementById(`p${p}-score`).innerText = players[p].score;
            }
        } else {
            playSound('wrong');
            selectedBtn.classList.add('wrong-anim');
            if (gameMode !== 'learn') players[p].failed.push(qData); // 오답 노트에 저장
            
            // 정답 초록색 표시
            let ansText = (gameMode !== 'learn') ? qData.a : qData.f;
            buttons.forEach(b => { if (b.innerText === ansText) b.classList.add('correct-anim'); });
        }

        // 1.2초 대기 후 다음 문제 (플레이어별 독립적 타이머)
        setTimeout(() => {
            players[p].qIndex++;
            if (players[p].qIndex < players[p].questions.length) {
                players[p].active = true;
                loadQuestion(p);
            } else {
                checkEndGame();
            }
        }, 1200);
    }

    // --- 게임 종료 체크 ---
    function checkEndGame() {
        // 2인용일 경우 두 명 모두 끝나야 결과 화면 표시
        if (gameMode === 'multi') {
            if (players[1].qIndex >= players[1].questions.length && players[2].qIndex >= players[2].questions.length) {
                showResults();
            }
        } else {
            if (players[1].qIndex >= players[1].questions.length) showResults();
        }
    }

    // --- 결과 화면 표시 ---
    function showResults() {
        showScreen('result-screen');
        const winnerText = document.getElementById('winner-text');
        const p2ResultBox = document.getElementById('p2-result');
        const learnBtn = document.getElementById('learn-btn');
        
        document.getElementById('p1-final-score').innerText = (gameMode === 'learn') ? "완료!" : `${players[1].score}점`;

        if (gameMode === 'multi') {
            winnerText.style.display = 'block';
            p2ResultBox.style.display = 'block';
            document.getElementById('p2-final-score').innerText = `${players[2].score}점`;
            
            if (players[1].score > players[2].score) { winnerText.innerText = "👑 도전자 1 승리!"; winnerText.style.color = "var(--p1-color)"; }
            else if (players[2].score > players[1].score) { winnerText.innerText = "👑 도전자 2 승리!"; winnerText.style.color = "var(--p2-color)"; }
            else { winnerText.innerText = "🤝 무승부!"; winnerText.style.color = "var(--correct)"; }
            
            // 둘 중 한 명이라도 틀린 게 있으면 복습 버튼 표시
            learnBtn.style.display = (players[1].failed.length > 0 || players[2].failed.length > 0) ? 'block' : 'none';

        } else {
            winnerText.style.display = 'none';
            p2ResultBox.style.display = 'none';
            
            if (gameMode === 'learn') {
                document.getElementById('p1-feedback').innerText = "복습을 완료했습니다!";
                learnBtn.style.display = 'none';
            } else {
                const rate = players[1].score / (settings.count * 10);
                if (rate < 0.5 && players[1].failed.length > 0) {
                    document.getElementById('p1-feedback').innerText = "조금 더 연습이 필요해요!";
                    learnBtn.style.display = 'block';
                } else if (rate === 1) {
                    document.getElementById('p1-feedback').innerText = "완벽해요! 속담 왕!";
                    learnBtn.style.display = 'none';
                } else {
                    document.getElementById('p1-feedback').innerText = "참 잘했어요!";
                    learnBtn.style.display = (players[1].failed.length > 0) ? 'block' : 'none';
                }
            }
        }
    }

    // 초기 테마 설정
    toggleDarkMode();
</script>
