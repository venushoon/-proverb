<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>초등 속담/관용구 마스터</title>
    <style>
        /* 기본 색상 및 다크모드 변수 설정 */
        :root {
            --bg-color: #f0f9ff;
            --container-bg: #ffffff;
            --text-color: #2b2d42;
            --primary: #4cc9f0;
            --secondary: #4895ef;
            --accent: #f72585;
            --correct: #4caf50;
            --wrong: #f44336;
            --btn-bg: #ffffff;
            --btn-border: #4cc9f0;
            --shadow: rgba(0,0,0,0.1);
        }

        body.dark-mode {
            --bg-color: #1a1a2e;
            --container-bg: #16213e;
            --text-color: #e94560;
            --primary: #0f3460;
            --secondary: #e94560;
            --accent: #4cc9f0;
            --btn-bg: #1a1a2e;
            --btn-border: #e94560;
            --shadow: rgba(255,255,255,0.05);
            color: white;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Nanum Gothic', 'Malgun Gothic', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
            transition: background-color 0.3s;
            touch-action: manipulation;
            -webkit-user-select: none;
            user-select: none;
        }

        .screen {
            display: none;
            width: 95vw;
            max-width: 1200px; /* 전자칠판 대응 넓은 크기 */
            height: 90vh;
            max-height: 900px;
            background: var(--container-bg);
            border-radius: 30px;
            box-shadow: 0 10px 30px var(--shadow);
            padding: 4vmin;
            flex-direction: column;
            position: relative;
            transition: all 0.3s;
        }

        .screen.active { display: flex; }

        /* 공통 헤더/타이틀 */
        h1, h2 { text-align: center; color: var(--text-color); margin-top: 0; }
        h1 { font-size: clamp(2rem, 5vw, 4rem); }
        h2 { font-size: clamp(1.5rem, 4vw, 3rem); }

        /* 버튼 기본 스타일 */
        button {
            font-family: inherit;
            cursor: pointer;
            border-radius: 15px;
            border: none;
            font-weight: bold;
            transition: transform 0.1s, filter 0.2s;
        }
        button:active { transform: scale(0.95); }
        
        .main-btn {
            background: var(--secondary);
            color: white;
            font-size: clamp(1.5rem, 3vw, 2.5rem);
            padding: 2vmin 4vmin;
            margin: 10px auto;
            display: block;
        }

        /* 메인 화면 */
        #home-screen { justify-content: center; align-items: center; }
        .menu-buttons { display: flex; gap: 20px; margin-top: 40px; }

        /* 설정 화면 */
        .settings-group {
            background: var(--bg-color);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 20px;
            font-size: clamp(1.2rem, 2.5vw, 1.8rem);
        }
        .settings-group label { margin-right: 15px; cursor: pointer; display: inline-block; margin-bottom: 10px; }
        .settings-group input[type="radio"], .settings-group input[type="checkbox"] { transform: scale(1.5); margin-right: 8px; }

        /* 게임 화면 */
        #top-bar { display: flex; justify-content: space-between; font-size: clamp(1.2rem, 2.5vw, 2rem); font-weight: bold; margin-bottom: 2vh; }
        
        #question-box {
            background: var(--primary);
            color: white;
            flex-grow: 1;
            max-height: 30vh;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2vmin;
            margin-bottom: 3vh;
            box-shadow: inset 0 5px 10px rgba(0,0,0,0.1);
        }

        /* 텍스트 자동 크기 조절 및 2줄 처리 */
        .text-fit {
            text-align: center;
            word-break: keep-all;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            line-height: 1.4;
            font-size: clamp(1.5rem, 4vw, 3.5rem);
        }

        .highlight { color: #ffeb3b; font-weight: 900; text-decoration: underline; }

        #options-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 2vmin;
            flex-grow: 2;
        }

        .option-btn {
            background: var(--btn-bg);
            border: 4px solid var(--btn-border);
            color: var(--text-color);
            font-size: clamp(1.2rem, 3vw, 2.5rem);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2vmin;
            word-break: keep-all;
            line-height: 1.3;
        }

        .option-btn.correct-anim { background-color: var(--correct) !important; color: white !important; border-color: var(--correct) !important; }
        .option-btn.wrong-anim { background-color: var(--wrong) !important; color: white !important; border-color: var(--wrong) !important; }

        /* 결과 화면 */
        #result-screen { justify-content: center; align-items: center; text-align: center; }
        .score-text { font-size: clamp(2rem, 5vw, 4rem); margin: 20px 0; color: var(--accent); font-weight: bold; }
        .feedback-text { font-size: clamp(1.5rem, 3vw, 2rem); margin-bottom: 40px; }

        /* 반응형: 스마트폰 세로 모드일 때 옵션을 위아래로 길게 */
        @media (max-width: 600px) {
            #options-grid { grid-template-columns: 1fr; }
            .screen { height: 95vh; }
        }
    </style>
</head>
<body>

    <div id="home-screen" class="screen active">
        <h1>📚 속담 & 관용구 팡팡!</h1>
        <div class="menu-buttons">
            <button class="main-btn" onclick="startGame()">게임 시작</button>
            <button class="main-btn" onclick="openSettings()" style="background: var(--primary);">⚙️ 설정</button>
        </div>
    </div>

    <div id="settings-screen" class="screen">
        <h2>⚙️ 게임 설정</h2>
        
        <div class="settings-group">
            <strong>📖 주제 선택:</strong><br>
            <label><input type="radio" name="theme" value="all" checked> 랜덤 (전체)</label>
            <label><input type="radio" name="theme" value="animal"> 동물 관련</label>
            <label><input type="radio" name="theme" value="idiom"> 관용구</label>
        </div>

        <div class="settings-group">
            <strong>🔢 문제 수:</strong><br>
            <label><input type="radio" name="count" value="10"> 10개 (테스트)</label>
            <label><input type="radio" name="count" value="20" checked> 20개</label>
            <label><input type="radio" name="count" value="30"> 30개</label>
            <label><input type="radio" name="count" value="50"> 50개</label>
            <label><input type="radio" name="count" value="100"> 100개</label>
        </div>

        <div class="settings-group">
            <strong>🔊 효과음 및 화면:</strong><br>
            <label><input type="checkbox" id="audio-toggle" checked> 오디오 켜기</label><br>
            <label><input type="checkbox" id="dark-toggle" onchange="toggleDarkMode()"> 🌙 다크 모드</label>
        </div>

        <button class="main-btn" onclick="closeSettings()">저장 및 뒤로가기</button>
    </div>

    <div id="game-screen" class="screen">
        <div id="top-bar">
            <span id="mode-badge">🎮 퀴즈 모드</span>
            <span>문제: <span id="q-current">1</span> / <span id="q-total">20</span></span>
            <span>점수: <span id="score">0</span></span>
        </div>

        <div id="question-box">
            <div id="question-text" class="text-fit">문제가 표시됩니다.</div>
        </div>

        <div id="options-grid">
            <button class="option-btn" onclick="checkAnswer(0)"></button>
            <button class="option-btn" onclick="checkAnswer(1)"></button>
            <button class="option-btn" onclick="checkAnswer(2)"></button>
            <button class="option-btn" onclick="checkAnswer(3)"></button>
        </div>
    </div>

    <div id="result-screen" class="screen">
        <h1>게임 종료!</h1>
        <div class="score-text">최종 점수: <span id="final-score">0</span>점</div>
        <div class="feedback-text" id="feedback-message">수고하셨습니다!</div>
        
        <div class="menu-buttons">
            <button class="main-btn" id="learn-btn" onclick="startLearningMode()" style="display:none; background:var(--accent);">📖 오답 학습하기</button>
            <button class="main-btn" onclick="showScreen('home-screen')">🏠 홈으로</button>
        </div>
    </div>

    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playSound(type) {
        if (!settings.audio) return;
        if (audioCtx.state === 'suspended') audioCtx.resume();
        
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);

        if (type === 'correct') {
            osc.type = 'sine';
            osc.frequency.setValueAtTime(600, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(1000, audioCtx.currentTime + 0.1);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
            osc.start(); osc.stop(audioCtx.currentTime + 0.2);
        } else {
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(300, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(150, audioCtx.currentTime + 0.2);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);

            osc.start(); osc.stop(audioCtx.currentTime + 0.2);
        }

    function toggleDarkMode() {
        settings.isDark = document.getElementById('dark-toggle').checked;
        if(settings.isDark) document.body.classList.add('dark-mode');
        else document.body.classList.remove('dark-mode');
    }

    // --- 게임 시작 ---
    function startGame() {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        isLearningMode = false;
        score = 0;
        currentQIndex = 0;
        failedQuestions = [];
        
        // 데이터 필터링
        let pool = allData.filter(d => settings.theme === 'all' || d.t === settings.theme);
        // 부족하면 전체에서 보충
        if(pool.length < settings.count) pool = [...allData]; 
        
        // 셔플 및 자르기
        currentQuestions = pool.sort(() => Math.random() - 0.5).slice(0, settings.count);
        
        document.getElementById('q-total').innerText = currentQuestions.length;
        document.getElementById('score').innerText = score;
        document.getElementById('mode-badge').innerText = "🎮 퀴즈 모드";
        
        showScreen('game-screen');
        loadQuestion();
    }

    // --- 학습 모드 시작 ---
    function startLearningMode() {
        isLearningMode = true;
        currentQIndex = 0;
        score = 0; // 학습 모드는 점수 무의미하지만 초기화
        currentQuestions = [...failedQuestions].sort(() => Math.random() - 0.5);
        
        document.getElementById('q-total').innerText = currentQuestions.length;
        document.getElementById('score').innerText = "-";
        document.getElementById('mode-badge').innerText = "📖 학습 모드";
        
        showScreen('game-screen');
        loadQuestion();
    }

    // --- 문제 로드 ---
    function loadQuestion() {
        gameActive = true;
        document.getElementById('q-current').innerText = currentQIndex + 1;
        
        const qData = currentQuestions[currentQIndex];
        const buttons = document.querySelectorAll('.option-btn');
        buttons.forEach(btn => {
            btn.className = 'option-btn'; // 클래스 초기화
            btn.style.pointerEvents = 'auto';
        });

        if (!isLearningMode) {
            // 일반 게임: 속담 빈칸 맞추기
            let formattedQ = qData.q.replace("[ ]", "<span class='highlight'>[ &nbsp; ]</span>");
            document.getElementById('question-text').innerHTML = formattedQ;

            let ops = [qData.a, ...qData.o.slice(0,3)].sort(() => Math.random() - 0.5);
            buttons.forEach((btn, i) => { btn.innerText = ops[i]; });
        } else {
            // 학습 모드: 뜻을 보고 전체 속담 맞추기
            document.getElementById('question-text').innerHTML = `<span style="font-size:0.8em; color:var(--primary)">다음 뜻을 가진 속담/관용구는?</span><br>${qData.m}`;
            
            // 정답 속담 1개 + 오답 속담 3개 무작위 추출
            let wrongOps = allData.filter(d => d.f !== qData.f).sort(() => Math.random() - 0.5).slice(0,3).map(d => d.f);
            let ops = [qData.f, ...wrongOps].sort(() => Math.random() - 0.5);
            
            buttons.forEach((btn, i) => { btn.innerText = ops[i]; });
        }
    }

    // --- 정답 확인 ---
    function checkAnswer(btnIndex) {
        if (!gameActive) return;
        gameActive = false;
        
        const buttons = document.querySelectorAll('.option-btn');
        const selectedBtn = buttons[btnIndex];
        const qData = currentQuestions[currentQIndex];
        
        let isCorrect = false;
        if (!isLearningMode) {
            isCorrect = (selectedBtn.innerText === qData.a);
        } else {
            isCorrect = (selectedBtn.innerText === qData.f);
        }

        buttons.forEach(b => b.style.pointerEvents = 'none'); // 중복 클릭 방지

        if (isCorrect) {
            playSound('correct');
            selectedBtn.classList.add('correct-anim');
            if(!isLearningMode) score += 10;
            document.getElementById('score').innerText = score;
        } else {
            playSound('wrong');
            selectedBtn.classList.add('wrong-anim');
            if(!isLearningMode) failedQuestions.push(qData);
            
            // 정답 버튼 찾아 표시
            let ansText = !isLearningMode ? qData.a : qData.f;
            buttons.forEach(b => {
                if (b.innerText === ansText) b.classList.add('correct-anim');
            });
        }

        // 1.5초 후 다음 문제
        setTimeout(() => {
            currentQIndex++;
            if (currentQIndex < currentQuestions.length) {
                loadQuestion();
            } else {
                endGame();
            }
        }, 1500);
    }

    // --- 게임 종료 및 결과 ---
    function endGame() {
        showScreen('result-screen');
        document.getElementById('final-score').innerText = isLearningMode ? "학습 완료!" : score;
        
        const learnBtn = document.getElementById('learn-btn');
        
        if (!isLearningMode) {
            const maxScore = currentQuestions.length * 10;
            const correctRate = score / maxScore;
            
            if (correctRate < 0.5 && failedQuestions.length > 0) {
                document.getElementById('feedback-message').innerText = "정답률이 50% 미만입니다. 틀린 문제를 다시 학습해 볼까요?";
                learnBtn.style.display = 'block';
            } else if (correctRate === 1) {
                document.getElementById('feedback-message').innerText = "완벽합니다! 속담 마스터!";
                learnBtn.style.display = 'none';
            } else {
                document.getElementById('feedback-message').innerText = "참 잘했어요! 다음엔 만점에 도전하세요.";
                if(failedQuestions.length > 0) learnBtn.style.display = 'block';
                else learnBtn.style.display = 'none';
            }
        } else {
            document.getElementById('feedback-message').innerText = "학습을 모두 마쳤습니다. 훌륭해요!";
            learnBtn.style.display = 'none';
        }
    }

    // 초기 설정 동기화
    toggleDarkMode();
</script>

</body>
</html>
